name: Backup

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  matrix:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - id: matrix
        run: echo 'matrix=[{"owner":"USA-RedDragon"},{"owner":"AstroGardenLLC"},{"owner":"kubewg-net"},{"owner":"USA-RedDragon-ORG"}]' >>"$GITHUB_OUTPUT"

  backup:
    name: Backup
    needs: [matrix]
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        owners: ${{fromJson(needs.matrix.outputs.matrix)}}
    permissions:
      contents: read
    steps:
      - name: Configure B2 Credentials
        run: |
          aws configure set aws_access_key_id "${{ secrets.B2_APPLICATION_KEY_ID }}"
          aws configure set aws_secret_access_key "${{ secrets.B2_APPLICATION_KEY }}"
          aws configure set region auto
      - name: GitHub Token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ matrix.owners.owner }}
      - name: Backup repos
        id: backup
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -eu
          gh auth setup-git
          do_backup() (
            set -eu
            source <(yq -p=json -o=shell <<<"$1")
            mkdir -p "${{ matrix.owners.owner }}"
            reponame="${{ matrix.owners.owner }}_$name"
            repodir="${{ matrix.owners.owner }}/$name"
            git clone --mirror "https://github.com/${{ matrix.owners.owner }}/$name" "$reponame"
            tar --sort=name --mtime="$pushedAt" -cf "$reponame.tar" "$reponame"
            rm -rf "$reponame"
            mkdir -p "$repodir"
            mv "$reponame.tar" "$repodir"
            du -sh "$repodir"
            aws s3 sync "$repodir" "s3://mcswain-git-backups/$repodir" --endpoint-url "${{ secrets.B2_ENDPOINT_URL }}"
            rm -rf "$repodir"
          )
          export -f do_backup
          gh repo list --no-archived --limit=9999 --json name,pushedAt ${{ matrix.owners.owner }} \
            | jq -c 'sort_by(.name | ascii_downcase) | .[]' \
            | parallel do_backup 2>&1
